name: Devcontainer Image

"on":
  pull_request:
    branches: [main]
    paths:
      - .devcontainer/Containerfile
      - .devcontainer/image-version
      - .github/workflows/devcontainer-image.yml

permissions:
  contents: read
  packages: write

jobs:
  guard-version-sync:
    name: Guard - ensure version bump
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if Containerfile and image-version are in sync
        run: |
          # Get list of changed files
          changed_files="$(git diff --name-only origin/main...HEAD)"

          containerfile_changed=false
          version_changed=false

          if echo "${changed_files}" | grep -q '^\.devcontainer/Containerfile$'; then
            containerfile_changed=true
          fi

          if echo "${changed_files}" | grep -q '^\.devcontainer/image-version$'; then
            version_changed=true
          fi

          # If Containerfile changed but image-version didn't, fail
          if [[ "${containerfile_changed}" == "true" ]] && [[ "${version_changed}" == "false" ]]; then
            echo "❌ Containerfile was modified but image-version was not."
            echo "When updating .devcontainer/Containerfile, you must also bump the version in .devcontainer/image-version."
            echo ""
            echo "Changed files:"
            echo "${changed_files}"
            exit 1
          fi

          echo "✅ Version sync check passed."
          echo "Containerfile changed: ${containerfile_changed}"
          echo "image-version changed: ${version_changed}"

  build-check-test-and-push:
    name: Build devcontainer and validate
    runs-on: ubuntu-24.04
    needs: guard-version-sync
    environment:
      name: container-publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Read image version
        id: image-version
        run: |
          image_version="$(tr -d '[:space:]' < .devcontainer/image-version)"
          if ! printf '%s\n' "${image_version}" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semantic version in .devcontainer/image-version: ${image_version}" >&2
            exit 1
          fi
          echo "image_version=${image_version}" >> "${GITHUB_OUTPUT}"

      - name: Prepare image reference
        id: image-ref
        run: |
          image_ref="ghcr.io/${GITHUB_REPOSITORY,,}-dev:${{ steps.image-version.outputs.image_version }}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Build image from devcontainer Containerfile
        run: |
          docker build \
            -t "${{ steps.image-ref.outputs.image_ref }}" \
            -f .devcontainer/Containerfile \
            .

      - name: Run build check in container
        run: |
          docker run --rm \
            -v "$PWD:/code" \
            -w /code \
            --entrypoint /bin/bash \
            "${{ steps.image-ref.outputs.image_ref }}" \
            ./build check

      - name: Run build test in container
        run: |
          docker run --rm \
            -v "$PWD:/code" \
            -w /code \
            --entrypoint /bin/bash \
            "${{ steps.image-ref.outputs.image_ref }}" \
            ./build test

      - name: Login to GHCR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push versioned image to GHCR
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: docker push "${{ steps.image-ref.outputs.image_ref }}"

      - name: Explain skipped push for fork PR
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Skipping GHCR push because this pull request comes from a fork."
