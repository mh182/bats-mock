name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "feature/**", "release/**"]
    paths-ignore:
      - .devcontainer/Containerfile
      - .devcontainer/image-version
      - .github/workflows/devcontainer-image.yml
  workflow_dispatch:

permissions:
  pull-requests: write
  packages: read

jobs:
  # -------------------------------------------------------
  # Formal checks (formatting + linting)
  # -------------------------------------------------------
  lint:
    name: Formal Checks (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v5

      - name: 🧮 Read image version
        id: image-version
        run: |
          image_version="$(tr -d '[:space:]' < .devcontainer/image-version)"
          if ! printf '%s\n' "${image_version}" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semantic version in .devcontainer/image-version: ${image_version}" >&2
            exit 1
          fi
          echo "image_ref=ghcr.io/${GITHUB_REPOSITORY,,}-dev:${image_version}" >> "${GITHUB_OUTPUT}"

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Pull development container image
        run: docker pull "${{ steps.image-version.outputs.image_ref }}"

      - name: 🔍 Run formal checks
        run: |
          echo "Running ./build check ..."
          docker run --rm \
            -v "$PWD:/code" \
            -w /code \
            --entrypoint /bin/bash \
            "${{ steps.image-version.outputs.image_ref }}" \
            ./build check

      - name: Comment broken links in documentation
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: .lychee-out.md

      - name: 🧪 Run Bats tests in development container
        run: |
          echo "Running Bats tests..."
          docker run --rm \
            -v "$PWD:/code" \
            -w /code \
            --entrypoint /bin/bash \
            "${{ steps.image-version.outputs.image_ref }}" \
            -lc 'bats --version && bats test --print-output-on-failure'

  # -------------------------------------------------------
  # Bats test suite across OS versions
  # -------------------------------------------------------
  test:
    name: Bats Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # Tests on ubuntu-22.04 fail since bats is too old
        os: [ubuntu-24.04, macos-14, macos-15]

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v5

      - name: 🧰 Install dependencies
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -y
            sudo apt-get install -y bats
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew update
            brew install bats-core
          fi

      - name: 🧪 Run Bats tests
        run: |
          echo "Running Bats tests..."
          bats --version
          bats test --print-output-on-failure
      - name: 🐞 Start tmate session (manual trigger only)
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.debug_enabled == 'true' &&
          matrix.os == github.event.inputs.debug_os
        uses: mxschmitt/action-tmate@v3
